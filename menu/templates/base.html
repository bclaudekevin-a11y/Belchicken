{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belchicken</title>
    <link rel="shortcut icon" href="{% static 'menu/image/logo(1).JPG' %}" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #fff9e6;
        }

        /* HEADER */
        .header {
            background-color: #a01318;
            color: #fff;
            padding: 12px 16px;
            position: relative;
        }

        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            color: #F7941D;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
        }

        /* BURGER ICON */
        .burger-icon {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 28px;
            height: 20px;
            cursor: pointer;
        }

        .burger-icon span {
            display: block;
            height: 3px;
            background-color: #F7941D;
            border-radius: 2px;
        }

        /* SEARCH BAR */
        .search-bar {
            display: flex;
            margin-top: 10px;
        }

        .search-bar input {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 20px 0 0 20px;
            outline: none;
        }

        .search-bar button {
            background-color: #F7941D;
            border: none;
            padding: 8px 14px;
            border-radius: 0 20px 20px 0;
            cursor: pointer;
        }

        /* BURGER MENU (caché par défaut) */
        .burger-toggle {
            display: none;
        }

        .burger-menu {
            position: fixed;
            top: 0;
            left: -260px;
            width: 260px;
            height: 100%;
            background-color: #fff;
            box-shadow: 2px 0 8px rgba(0,0,0,0.3);
            transition: left 0.3s ease;
            z-index: 100;
            padding-top: 60px;
        }

        .burger-menu ul {
            list-style: none;
        }

        .burger-menu li a {
            display: block;
            padding: 14px 20px;
            color: #a01318;
            text-decoration: none;
            border-bottom: 1px solid #f0f0f0;
            font-weight: bold;
        }

        .burger-menu li a:hover {
            background-color: #F7941D33;
        }

        /* OVERLAY */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 99;
        }

        /* QUAND LE CHECKBOX EST COCHÉ : on ouvre */
        .burger-toggle:checked ~ .burger-menu {
            left: 0;
        }

        .burger-toggle:checked ~ .overlay {
            display: block;
        }

        /* HERO (page d'accueil) */
        .accueil-hero {
            text-align: center;
        }

        .hero-banner {
            width: 100%;
            height: 260px;
            object-fit: cover;
            object-position: center 30%;
            display: block;
            border-radius: 0 0 12px 12px;
        }

        .hero-logo {
            display: block;
            max-width: 160px;
            margin: 12px auto 8px auto;
        }

        .accueil-hero h1 {
            color: #a01318;
            font-size: 26px;
            margin-bottom: 6px;
            padding: 0 16px;
        }

        .accueil-hero p {
            color: #555;
            padding: 0 16px 16px 16px;
        }

        /* GRILLE PRODUITS (2 colonnes, style McDo) */
        .produits-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 16px;
        }

        .produit-card {
            background-color: #fff;
            border-radius: 12px;
            padding: 12px;
            text-align: left;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        .produit-card img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .produit-card h3 {
            color: #1a1a1a;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .prix {
            font-weight: bold;
            color: #a01318;
            font-size: 15px;
        }

        .prix-barre {
            text-decoration: line-through;
            color: #999;
            font-size: 13px;
            margin: 0;
        }

        .prix-promo {
            color: #a01318;
            font-weight: bold;
            font-size: 17px;
            margin: 0;
        }

        .badge-promo {
            position: absolute;
            top: 8px;
            right: 8px;
            background-color: #F7941D;
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 10px;
        }

        /* FOOTER */
        .footer {
            background-color: #a01318;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        .footer p {
            margin: 4px 0;
        }
        .categorie-header {
         padding: 20px 16px 8px 16px;
         text-align: center;
        }

        .categorie-header h1 {
         color: #ED1C24;
         font-size: 24px;
        }
        .btn-commander {
    background-color: #ffc107;
    color: #000;
    font-weight: bold;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
    transition: background 0.2s;
}

.btn-commander:hover {
    background-color: #e0a800;
}
    </style>
</head>
<body>

    <header class="header">
        <input type="checkbox" id="burger-toggle" class="burger-toggle">

        <div class="header-top">
            <label for="burger-toggle" class="burger-icon">
                <span></span>
                <span></span>
                <span></span>
            </label>

            <a href="{% url 'menu:accueil' %}" class="logo">Belchicken</a>
        </div>

        <form class="search-bar" method="get" action="">
            <input type="text" name="q" placeholder="Rechercher un produit...">
            <button type="submit">🔍</button>
        </form>

        <nav class="burger-menu">
            <ul>
                <li><a href="{% url 'menu:accueil' %}">Accueil</a></li>
                {% for cat in categories_menu %}
                    <li><a href="{% url 'menu:categorie_detail' cat.id %}">{{ cat.nom }}</a></li>
                {% endfor %}
            </ul>
        </nav>

        <label for="burger-toggle" class="overlay"></label>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; {% now "Y" %} Belchicken. Tous droits réservés.</p>
        <p>Contactez-nous sur WhatsApp</p>
    </footer>
<!-- Bouton Panier Flottant (Style WhatsApp) -->
<a href="{% url 'commande:voir_panier' %}" id="btn-panier-flottant" class="btn-panier-flottant">
    <div class="panier-icon-wrapper">
        🛒
        
           <span id="badge-panier" class="badge-panier">
    {{ quantite_totale_panier }}
            </span>  
    </div>
    <span class="panier-texte">Mon Panier</span>
</a>

<style>
.btn-panier-flottant {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background-color: #e63946; /* Rouge Belchicken */
    color: #ffffff;
    padding: 12px 20px;
    border-radius: 50px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
    z-index: 1000;
    transition: transform 0.2s ease, background-color 0.2s ease;
}

.btn-panier-flottant:hover {
    transform: scale(1.05);
    background-color: #c1121f;
    color: #fff;
}

.panier-icon-wrapper {
    position: relative;
    font-size: 22px;
}

.badge-panier {
    position: absolute;
    top: -8px;
    right: -12px;
    background-color: #ffb703; /* Jaune/Or pour faire ressortir */
    color: #000;
    font-size: 12px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 50%;
    border: 2px solid #ffffff;
}

/* Version mobile plus compacte */
@media (max-width: 576px) {
    .btn-panier-flottant {
        bottom: 20px;
        right: 20px;
        padding: 10px 16px;
        font-size: 14px;
    }
}
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const boutonsAjout = document.querySelectorAll('.btn-ajouter-panier');

    boutonsAjout.forEach(bouton => {
        bouton.addEventListener('click', function(e) {
            e.preventDefault();
            const url = this.getAttribute('href') || this.dataset.url;

            fetch(url, {
                method: 'GET',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    // Mettre à jour le chiffre sur le badge du panier flottant
                    const badge = document.getElementById('badge-panier');
                    if (badge) {
                        badge.innerText = data.total_articles;
                    }

                    // Petite animation d'impulsion sur le bouton flottant
                    const btnFlottant = document.getElementById('btn-panier-flottant');
                    if (btnFlottant) {
                        btnFlottant.style.transform = 'scale(1.2)';
                        setTimeout(() => {
                            btnFlottant.style.transform = 'scale(1)';
                        }, 200);
                    }
                }
            })
            .catch(error => console.error('Erreur:', error));
        });
    });
});
</script>
</body>
</html>
